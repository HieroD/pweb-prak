<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body{
            margin: 0px;
        }
        nav{
            margin-left: 10px;
            margin-right: 10px;
            padding: 10px;
            border: 2px solid;
            background-color: greenyellow;
            display: flex;
            justify-content: space-between;
        }
        #logo span{
            margin-left: 10px;
        }
        #navbar a{
            margin-left: 5px;
        }
        main{
            margin-left: 10px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <header>
        <nav>
            <div id="logo">
                <a href=""><img src="" alt="logo"></a>
                <span>Aneka Vandel</span>
            </div>
            <div id="navbar">
                <a href="">About</a>
                <a href="">Catalog</a>
                <a href=""><button>Sign in</button></a>
            </div>
        </nav>
    </header>
    

    <!-- MAIN -->
    <main>
        <!-- Login section -->
        <div class="login">
            <h2>Sign in</h2>
            <form method="post">
                <label for="email">Email <br></label>
                <input type="email" id="email" name="email" required>

                <br>
                <label for="pass">Password <br></label>
                <input type="password" name="pass">

                <br>
                <label for="check">Remember Me?</label>
                <input type="checkbox" name="check">
                <a href="">Forgot Password?</a>

                <br>
                <button type="submit">Sign in</button>
            </form>
        
        </div>
    </main>
    

    <!-- FOOTER -->
     <footer>

     </footer>

</body>
</html>
